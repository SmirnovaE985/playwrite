stages:
  - test

playwright_regress:
  stage: test
  timeout: 2h
  tags:
    - docker
  image: mcr.microsoft.com/playwright:v1.50.0-jammy

  variables:
    PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"

  before_script:
    - node -v
    - npm -v
    - npm ci
    - npx playwright install --with-deps
    - curl -fsSL -o allurectl https://github.com/allure-framework/allurectl/releases/download/2.18.0/allurectl_linux_amd64
    - chmod +x allurectl
    - ./allurectl --version

  script:
    # Просто логируем доступность Allure (не валим job)
    - curl -vk --connect-timeout 10 --max-time 30 "$ALLURE_ENDPOINT/api/uaa/account/me" || true

    # Запуск тестов + отправка результатов в Allure TestOps
    - ./allurectl watch -- npx playwright test -c playwright.config.ts --project=chromium --grep @regress

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - allure-results/